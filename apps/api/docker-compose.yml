services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mutafriches-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Serveur SMTP de capture pour tester les emails en local (UI web sur :8026)
  # Ports hote decales (1026/8026) pour cohabiter avec d'autres MailHog locaux
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mutafriches-mailhog
    ports:
      - "1026:1025"
      - "8026:8025"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
