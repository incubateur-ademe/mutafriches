name: Partenaires cache prefetch

on:
  schedule:
    # Quotidien à 04:00 UTC (TTL serveur = 24h)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement à pré-chauffer"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
          - both
      partenaire:
        description: "Slug d'un partenaire à pré-chauffer (vide = tous)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  prefetch:
    name: Prefetch ${{ matrix.env.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - name: production
            url_var: PROD_API_URL
          - name: staging
            url_var: STAGING_API_URL
    steps:
      - name: Determine if should run
        id: check
        env:
          EVENT: ${{ github.event_name }}
          ENV_NAME: ${{ matrix.env.name }}
          SELECTED: ${{ github.event.inputs.environment }}
        run: |
          if [ "$EVENT" = "schedule" ] || [ "$SELECTED" = "both" ] || [ "$SELECTED" = "$ENV_NAME" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Environnement $ENV_NAME non sélectionné — skip"
          fi

      - name: Checkout code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Setup pnpm
        if: steps.check.outputs.should_run == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        if: steps.check.outputs.should_run == 'true'
        run: pnpm --filter @mutafriches/shared-types build

      - name: Build API
        if: steps.check.outputs.should_run == 'true'
        run: pnpm --filter api run build:nest

      - name: Prefetch enrichments (${{ matrix.env.name }})
        if: steps.check.outputs.should_run == 'true'
        env:
          API_URL: ${{ vars[matrix.env.url_var] }}
          # Vide en mode planifié : pré-chauffe tous les partenaires du registre
          PARTENAIRE: ${{ github.event.inputs.partenaire }}
          PARTENAIRES_PREFETCH_DELAY_MS: 2000
        run: |
          if [ -z "$API_URL" ]; then
            echo "Variable ${{ matrix.env.url_var }} non configurée — skip"
            exit 0
          fi
          echo "Pré-chauffe sur $API_URL"
          pnpm partenaires:prefetch
